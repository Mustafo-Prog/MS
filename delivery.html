<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/delivery.css">
    <title>Доставка и информация</title>
</head>
<body>
    <div class="wrapper">
        <main>
            <div class="main__head">
                <div class="main__head-left">
                    <h2>ООО «МАСТЕР СТРОЙ» ОСУЩЕСТВЛЯЕТ ДОСТАВКУ:</h2>
                    <p>После оформления заказа мы оперативно организуем доставку в Москве и Московской области.</p>
                </div>
                <div class="main__head-right">
                    <img src="./img/delivery__main__head__right__image.png" alt="road of tiles">
                </div>
            </div>
            <div class="main__foot">
                <div class="main__foot-left">
                    <img src="./img/delivery__main__foot__left.png" alt="truck full of something">
                </div>
                <div class="main__foot-right">
                    <div class="main__foot-right-head">
                        <h2>Наше производство</h2>
                    </div>

                        <p><span class="white-color">Время работы:</span> без выходных, круглосуточно</p>
                    </div>
                    <div class="main__foot-right-foot">
                        <p>+7 (499) 994-90-99</p>
                    </div>
                </div>
            </div>
        </main>
        <footer><img src="./img/mapelo.png" alt=""></footer>
